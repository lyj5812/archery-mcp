services:
  archery-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: archery-mcp:local
    stdin_open: true
    environment:
      ARCHERY_URL: ${ARCHERY_URL:?请设置 ARCHERY_URL}
      ARCHERY_USERNAME: ${ARCHERY_USERNAME:?请设置 ARCHERY_USERNAME}
      ARCHERY_PASSWORD: ${ARCHERY_PASSWORD:?请设置 ARCHERY_PASSWORD}
      ARCHERY_VERIFY_TLS: ${ARCHERY_VERIFY_TLS:-true}
      ARCHERY_TIMEOUT: ${ARCHERY_TIMEOUT:-30}
      ARCHERY_EXPORT_DIR: /exports
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${ARCHERY_EXPORT_DIR_HOST:-./exports}:/exports
