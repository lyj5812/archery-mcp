name: 构建 Windows EXE

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 构建并验证 EXE
        shell: pwsh
        run: .\build-exe.ps1 -Python python
      - name: 生成 SHA-256 校验文件
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/archery-mcp.exe -Algorithm SHA256).Hash
          "$hash  archery-mcp.exe" | Out-File dist/archery-mcp.exe.sha256 -Encoding ascii
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: archery-mcp-windows-x64
          path: |
            dist/archery-mcp.exe
            dist/archery-mcp.exe.sha256
          if-no-files-found: error
      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:GITHUB_REF_NAME" `
            dist/archery-mcp.exe `
            dist/archery-mcp.exe.sha256 `
            --verify-tag `
            --generate-notes `
            --title "$env:GITHUB_REF_NAME"
